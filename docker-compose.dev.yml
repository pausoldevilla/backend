# ─── Entorn de DESENVOLUPAMENT ───────────────────────────────────────────────
# Característiques:
#   - Hot-reload al backend (nodemon) i frontend (Vite)
#   - Codi font muntat com a volum (els canvis es reflecteixen immediatament)
#   - mongo-express per gestionar la BD visualment

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - ecommerce_net_dev

  # ── mongo-express (GUI per a MongoDB) ─────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: ecommerce-mongoexpress-dev
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    depends_on:
      - mongodb
    networks:
      - ecommerce_net_dev

  # ── Backend (Node/Express) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ecommerce-backend-dev
    restart: unless-stopped
    volumes:
      # Munta el codi font: els canvis s'apliquen sense reconstruir
      - ./backend:/app
      # Evitem que el node_modules del host sobreescrigui el del contenidor
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/ecommerce?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CLIENT_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - ecommerce_net_dev

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ecommerce-frontend-dev
    restart: unless-stopped
    volumes:
      # Munta el codi font per hot-reload
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ecommerce_net_dev

volumes:
  mongo_data_dev:

networks:
  ecommerce_net_dev:
    driver: bridge
